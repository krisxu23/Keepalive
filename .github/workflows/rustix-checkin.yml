name: rustix-auto-alive

on:
  # 支持手动触发
  workflow_dispatch:
  # 由 Uptime Kuma Webhook 触发（服务器离线时）
  repository_dispatch:
    types: [rustix]

# 同一时间只允许一个实例运行
concurrency:
  group: rustix-auto
  cancel-in-progress: false

permissions:
  repository-projects: write
  actions: write
  contents: write

jobs:
  rustix-alive:
    if: github.event_name != 'repository_dispatch' || contains(github.event.client_payload.status, 'Down')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 🐛 调试 - 打印收到的 client_payload
        run: |
          echo "event_name: ${{ github.event_name }}"
          echo 'client_payload: ${{ toJSON(github.event.client_payload) }}'

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: rustix-auto/requirements.txt

      - name: 安装依赖
        working-directory: rustix-auto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: python -m playwright install --with-deps chromium

      - name: 运行自动启动脚本
        working-directory: rustix-auto
        env:
          # 从 GitHub Secrets 读取账号，格式：邮箱:密码,邮箱:密码
          ACCOUNTS: ${{ secrets.RUSTIX_ACCOUNTS }}
          # 【新增】从 GitHub Secrets 读取 Cookie JSON 字符串
          RUSTIX_COOKIE: ${{ secrets.RUSTIX_COOKIE }}
          # 服务器ID，用于拼接控制台页面地址
          RUSTIX_SERVERID: ${{ secrets.RUSTIX_SERVERID }}
          # Telegram 通知（可选，未配置 Secret 则不推送）
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          # GitHub Token，用于更新 Repository Secrets（自动刷新 Cookie）
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python main.py

      - name: 上传运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log
          path: |
            rustix-auto/run.log
            rustix-auto/debug_*.png
          if-no-files-found: ignore
          retention-days: 7
