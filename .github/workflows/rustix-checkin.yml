name: rustix-auto-alive

on:
  workflow_dispatch:                 # 手动触发（保留）
  repository_dispatch:               # API 触发
    types: [cloudflare_cron_trigger] # 与 Worker 中的 event_type 严格一致

# 同一时间只允许一个实例运行
concurrency:
  group: rustix-auto
  cancel-in-progress: false

permissions:
  repository-projects: write
  actions: write
  contents: write

jobs:
  rustix-alive:
    # 若需根据条件执行，可在此添加 if，例如：
    # if: github.event_name == 'repository_dispatch' && github.event.client_payload.status == 'Down'
    # 现在无条件执行（每次触发都运行）
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 🐛 调试 - 打印收到的 client_payload
        run: |
          echo "event_name: ${{ github.event_name }}"
          echo 'client_payload: ${{ toJSON(github.event.client_payload) }}'

      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
          cache-dependency-path: rustix-auto/requirements.txt

      - name: 安装依赖
        working-directory: rustix-auto
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 安装 Playwright 浏览器
        run: python -m playwright install --with-deps chromium

      - name: 运行自动启动脚本
        working-directory: rustix-auto
        env:
          ACCOUNTS: ${{ secrets.RUSTIX_ACCOUNTS }}
          RUSTIX_COOKIE: ${{ secrets.RUSTIX_COOKIE }}
          RUSTIX_SERVERID: ${{ secrets.RUSTIX_SERVERID }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python main.py

      - name: 上传运行日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log
          path: |
            rustix-auto/run.log
            rustix-auto/debug_*.png
          if-no-files-found: ignore
          retention-days: 7
